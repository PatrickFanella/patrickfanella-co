  <title id="title">Project fallback artwork</title>
  <desc id="desc">A brutalist placeholder image used when a project asset is missing.</desc>
  <rect width="1600" height="1000" fill="#09090b" />
  <rect x="64" y="64" width="1472" height="872" fill="#121214" stroke="#3f3f46" stroke-width="12" />
  <rect x="112" y="112" width="1376" height="104" fill="#bef264" />
  <text x="136" y="182" fill="#09090b" font-family="'Space Grotesk', Arial, sans-serif" font-size="74" font-weight="700" letter-spacing="8">ASSET PENDING</text>
  <text x="136" y="332" fill="#f4f4f5" font-family="'JetBrains Mono', monospace" font-size="36" letter-spacing="6">PROJECT_MEDIA_FALLBACK</text>
  <text x="136" y="394" fill="#a1a1aa" font-family="'JetBrains Mono', monospace" font-size="24" letter-spacing="4">REPLACE WITH FINAL SCREENSHOT OR PRODUCT VISUAL</text>
  <rect x="136" y="470" width="520" height="220" fill="#0f0f10" stroke="#c084fc" stroke-width="8" />
