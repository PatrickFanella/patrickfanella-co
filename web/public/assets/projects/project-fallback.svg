  <text x="136" y="790" fill="#71717a" font-family="'JetBrains Mono', monospace" font-size="24" letter-spacing="4">patrickfanella.co / phase-3 placeholder pipeline</text>
  <line x1="136" y1="824" x2="1464" y2="824" stroke="#3f3f46" stroke-width="6" />
