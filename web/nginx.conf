server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 'ok';
  }

  error_page 404 /404.html;

  location = /404.html {
    internal;
  }

  location / {
    try_files $uri $uri/ $uri/index.html =404;
  }
}
