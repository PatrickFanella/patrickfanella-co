<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SoundHash — Fingerprinting Pipeline</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#1a1b26;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:32px;font-family:'Space Grotesk',sans-serif}.card{background:#282a36;padding:28px 20px;max-width:760px;width:100%;box-shadow:4px 4px 0 #805bca}svg text{font-family:'JetBrains Mono','Space Grotesk',monospace}</style>
</head>
<body>
<div class="card">
<svg width="100%" viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg">
<defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<text x="340" y="28" text-anchor="middle" font-size="14" font-weight="500" fill="#ff79c6">SoundHash — Audio fingerprinting pipeline</text>
<text x="340" y="46" text-anchor="middle" font-size="11" fill="#6272a4">From YouTube video to matchable acoustic fingerprint</text>

<!-- Stage 1: Ingest -->
<rect x="44" y="74" width="130" height="70" fill="#191a21"/><rect x="40" y="70" width="130" height="70" fill="#44475a" stroke="#8be9fd" stroke-width="2"/>
<text x="105" y="92" text-anchor="middle" font-size="12" font-weight="500" fill="#8be9fd">Ingest</text>
<text x="105" y="108" text-anchor="middle" font-size="9" fill="#f8f8f2" opacity="0.7">yt-dlp download</text>
<text x="105" y="122" text-anchor="middle" font-size="9" fill="#f8f8f2" opacity="0.7">channel crawler</text>

<line x1="170" y1="105" x2="198" y2="105" stroke="#6272a4" stroke-width="1.5" marker-end="url(#a)"/>

<!-- Stage 2: Extract audio -->
<rect x="204" y="74" width="130" height="70" fill="#191a21"/><rect x="200" y="70" width="130" height="70" fill="#44475a" stroke="#bd93f9" stroke-width="2"/>
<text x="265" y="92" text-anchor="middle" font-size="12" font-weight="500" fill="#bd93f9">Extract</text>
<text x="265" y="108" text-anchor="middle" font-size="9" fill="#f8f8f2" opacity="0.7">ffmpeg audio strip</text>
<text x="265" y="122" text-anchor="middle" font-size="9" fill="#f8f8f2" opacity="0.7">WAV normalization</text>

<line x1="330" y1="105" x2="358" y2="105" stroke="#6272a4" stroke-width="1.5" marker-end="url(#a)"/>

<!-- Stage 3: Spectrogram -->
<rect x="364" y="74" width="130" height="70" fill="#191a21"/><rect x="360" y="70" width="130" height="70" fill="#44475a" stroke="#ff79c6" stroke-width="2"/>
<text x="425" y="92" text-anchor="middle" font-size="12" font-weight="500" fill="#ff79c6">Analyze</text>
<text x="425" y="108" text-anchor="middle" font-size="9" fill="#f8f8f2" opacity="0.7">Spectral analysis</text>
<text x="425" y="122" text-anchor="middle" font-size="9" fill="#f8f8f2" opacity="0.7">Peak extraction</text>

<line x1="490" y1="105" x2="518" y2="105" stroke="#6272a4" stroke-width="1.5" marker-end="url(#a)"/>

<!-- Stage 4: Fingerprint -->
<rect x="524" y="74" width="130" height="70" fill="#191a21"/><rect x="520" y="70" width="130" height="70" fill="#44475a" stroke="#50fa7b" stroke-width="2"/>
<text x="585" y="92" text-anchor="middle" font-size="12" font-weight="500" fill="#50fa7b">Fingerprint</text>
<text x="585" y="108" text-anchor="middle" font-size="9" fill="#f8f8f2" opacity="0.7">Hash generation</text>
<text x="585" y="122" text-anchor="middle" font-size="9" fill="#f8f8f2" opacity="0.7">LSH indexing</text>

<!-- Arrow down to store -->
<line x1="585" y1="140" x2="585" y2="178" stroke="#6272a4" stroke-width="1.5" marker-end="url(#a)"/>

<!-- Store -->
<rect x="424" y="184" width="230" height="50" fill="#191a21"/><rect x="420" y="180" width="230" height="50" fill="#44475a" stroke="#f1fa8c" stroke-width="2"/>
<text x="535" y="200" text-anchor="middle" font-size="12" font-weight="500" fill="#f1fa8c">PostgreSQL</text>
<text x="535" y="216" text-anchor="middle" font-size="9" fill="#f8f8f2" opacity="0.7">Fingerprints + metadata + job state</text>

<!-- Match flow -->
<line x1="420" y1="205" x2="340" y2="205" stroke="#ffb86c" stroke-width="1.5" stroke-dasharray="4 3"/>
<line x1="340" y1="205" x2="340" y2="270" stroke="#ffb86c" stroke-width="1.5" marker-end="url(#a)"/>

<!-- Query path -->
<rect x="44" y="184" width="200" height="50" fill="#191a21"/><rect x="40" y="180" width="200" height="50" fill="#44475a" stroke="#ffb86c" stroke-width="2"/>
<text x="140" y="200" text-anchor="middle" font-size="12" font-weight="500" fill="#ffb86c">Query clip</text>
<text x="140" y="216" text-anchor="middle" font-size="9" fill="#f8f8f2" opacity="0.7">Unknown audio → fingerprint → match</text>

<line x1="240" y1="205" x2="340" y2="205" stroke="#ffb86c" stroke-width="1.5"/>

<!-- Match result -->
<rect x="204" y="276" width="276" height="50" fill="#191a21"/><rect x="200" y="272" width="276" height="50" fill="#44475a" stroke="#50fa7b" stroke-width="2.5"/>
<text x="338" y="292" text-anchor="middle" font-size="13" font-weight="500" fill="#50fa7b">Match found</text>
<text x="338" y="308" text-anchor="middle" font-size="10" fill="#f8f8f2" opacity="0.7">Source video · timestamp · confidence score</text>

<!-- Tech pills -->
<text x="340" y="356" text-anchor="middle" font-size="10" fill="#6272a4">Python 3 · FastAPI · SQLAlchemy · ffmpeg · yt-dlp · LSH index · Spectral DSP</text>
<text x="340" y="378" text-anchor="middle" font-size="10" fill="#ff79c6">68k+ LoC · 73 test files · 4 Docker variants</text>

</svg>
</div>
</body></html>
